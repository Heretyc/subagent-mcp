name: Publish

# Owner-approved publish workflow (not the Claude-routine dispatch bridge).
# Dual-publishes each GitHub release to the public npm registry via OIDC
# Trusted Publishing and to GitHub Packages. Documented exception to
# git-collaboration.md directive 23 (Actions otherwise dispatch/bridge only).

on:
  release:
    types: [published]

jobs:
  npm-public:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          # Trusted Publishing (OIDC) requires Node >= 22.14 and npm >= 11.5.1.
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run check:versions
      - run: npm run build
      - run: npm test
      # publishConfig.registry now targets npmjs (the default), so a bare publish
      # already routes here; --registry is kept explicit for clarity. Trusted
      # Publishing (OIDC) needs id-token: write and no token.
      - run: npm publish --provenance --access public --registry=https://registry.npmjs.org --@heretyc:registry=https://registry.npmjs.org
      - run: npm run verify:npmjs-release

  github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
      - run: npm ci
      - run: npm run check:versions
      - run: npm run build
      - run: npm test
      # publishConfig now defaults to npmjs, so route this job to GitHub Packages
      # explicitly with --registry; a bare publish would otherwise hit npmjs.
      - run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
