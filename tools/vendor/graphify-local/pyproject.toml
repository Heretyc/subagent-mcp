[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "graphifyy"
version = "0.5.7"
description = "AI coding assistant skill (Claude Code, Codex, OpenCode, Cursor, Gemini CLI, Aider, OpenClaw, Factory Droid, Trae, Hermes, Kiro, Google Antigravity) - turn any folder of code, docs, papers, images, or videos into a queryable knowledge graph"
readme = "README.md"
license = { file = "LICENSE" }
keywords = ["claude", "claude-code", "codex", "opencode", "cursor", "gemini", "aider", "kiro", "knowledge-graph", "rag", "graphrag", "obsidian", "community-detection", "tree-sitter", "leiden", "llm"]
requires-python = ">=3.10"
dependencies = [
    "networkx>=3.2,<4",
    "tree-sitter>=0.23.0,<0.25",
    "tree-sitter-python>=0.23,<0.24",
    "tree-sitter-javascript>=0.23,<0.24",
    "tree-sitter-typescript>=0.23,<0.24",
    "tree-sitter-go>=0.23,<0.24",
    "tree-sitter-rust>=0.23,<0.24",
    "tree-sitter-java>=0.23,<0.24",
    "tree-sitter-c>=0.23,<0.24",
    "tree-sitter-cpp>=0.23,<0.24",
    "tree-sitter-ruby>=0.23,<0.24",
    "tree-sitter-c-sharp>=0.23,<0.24",
    "tree-sitter-kotlin>=0.23,<0.24",
    "tree-sitter-scala>=0.23,<0.24",
    "tree-sitter-php>=0.23,<0.24",
    "tree-sitter-swift>=0.23,<0.24",
    "tree-sitter-lua>=0.23,<0.24",
    "tree-sitter-zig>=0.23,<0.24",
    "tree-sitter-powershell>=0.23,<0.24",
    "tree-sitter-elixir>=0.23,<0.24",
    "tree-sitter-objc>=0.23,<0.24",
    "tree-sitter-julia>=0.23,<0.24",
    "tree-sitter-verilog>=0.23,<0.24",
]

[project.urls]
Homepage = "https://github.com/safishamsi/graphify"
Repository = "https://github.com/safishamsi/graphify"
Issues = "https://github.com/safishamsi/graphify/issues"

[project.optional-dependencies]
mcp = ["mcp>=1.9,<2"]
neo4j = ["neo4j>=5.28,<6"]
pdf = ["pypdf>=5.6,<6", "html2text>=2025.4.15,<2026"]
watch = ["watchdog>=6.0,<7"]
svg = ["matplotlib>=3.10,<4"]
leiden = ["graspologic>=3.4,<4; python_version < '3.13'"]
office = ["python-docx>=1.1,<2", "openpyxl>=3.1,<4"]
video = ["faster-whisper>=1.1,<2", "yt-dlp>=2025.6.9,<2026"]
test = ["pytest>=7,<9", "pytest-cov>=5,<7"]
all = ["mcp>=1.9,<2", "neo4j>=5.28,<6", "pypdf>=5.6,<6", "html2text>=2025.4.15,<2026", "watchdog>=6.0,<7", "graspologic>=3.4,<4; python_version < '3.13'", "python-docx>=1.1,<2", "openpyxl>=3.1,<4", "faster-whisper>=1.1,<2", "yt-dlp>=2025.6.9,<2026", "matplotlib>=3.10,<4"]

[project.scripts]
graphify = "graphify.__main__:main"

[tool.uv]
# Install via: uv tool install graphifyy
# Run without installing: uvx graphifyy install
package = true

[tool.setuptools.packages.find]
where = ["."]
include = ["graphify*"]

[tool.setuptools.package-data]
graphify = ["skill.md", "skill-codex.md", "skill-windows.md"]
