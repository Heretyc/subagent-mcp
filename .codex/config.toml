# Project-local Codex config for the subagent-mcp repo.
#
# subagent-mcp is enabled in this workspace (dogfooding self-use allowed).

[mcp_servers.subagent-mcp]
enabled = true

[mcp_servers.graphify]
command = "python"
args = ["-m", "graphify.serve", "graphify-out/graph.json"]
startup_timeout_sec = 10
tool_timeout_sec = 60
enabled = true
